<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Login + Bank</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    width:340px;
    background:white;
    padding:20px;
    border-radius:12px;
}

h2{text-align:center;color:#764ba2;}

input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    background:#764ba2;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
}

.hidden{display:none;}

.card{
    background:#f3f3f3;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<!-- REGISTER -->
<div id="register">
    <h2>Register</h2>
    <input id="rUser" placeholder="Username">
    <input id="rPass" placeholder="Password">
    <button onclick="register()">Daftar</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
    <h2>Login</h2>
    <input id="lUser" placeholder="Username">
    <input id="lPass" placeholder="Password">
    <button onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">
    <h2>Dashboard</h2>

    <p id="welcome"></p>

    <input id="email" placeholder="Gmail / Email">

    <!-- BANK PILIHAN -->
    <select id="bank">
        <option value="">-- Pilih Bank --</option>
        <option>BRI</option>
        <option>Mandiri</option>
        <option>BCA</option>
        <option>BNI</option>
        <option>GoPay</option>
        <option>DANA</option>
    </select>

    <input id="rek" placeholder="Nomor Rekening / Nomor HP">
    <input id="nama" placeholder="Nama Pemilik">

    <button onclick="saveData()">Simpan Data</button>

    <div class="card" id="hasil"></div>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script>

// REGISTER
function register(){
    let u = document.getElementById("rUser").value;
    let p = document.getElementById("rPass").value;

    if(!u || !p){
        alert("Isi semua data!");
        return;
    }

    localStorage.setItem("user", u);
    localStorage.setItem("pass", p);

    alert("Register berhasil!");
    document.getElementById("register").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

// LOGIN
function login(){
    let u = document.getElementById("lUser").value;
    let p = document.getElementById("lPass").value;

    let su = localStorage.getItem("user");
    let sp = localStorage.getItem("pass");

    if(u === su && p === sp){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("dash").classList.remove("hidden");
        document.getElementById("welcome").innerText = "Halo, " + u;
        loadData();
    } else {
        alert("Login gagal!");
    }
}

// SIMPAN DATA
function saveData(){
    let email = document.getElementById("email").value;
    let bank = document.getElementById("bank").value;
    let rek = document.getElementById("rek").value;
    let nama = document.getElementById("nama").value;

    if(!email || !bank || !rek || !nama){
        alert("Isi semua data!");
        return;
    }

    localStorage.setItem("email", email);
    localStorage.setItem("bank", bank);
    localStorage.setItem("rek", rek);
    localStorage.setItem("nama", nama);

    loadData();
}

// TAMPILKAN DATA
function loadData(){
    let email = localStorage.getItem("email");
    let bank = localStorage.getItem("bank");
    let rek = localStorage.getItem("rek");
    let nama = localStorage.getItem("nama");

    if(email){
        document.getElementById("hasil").innerHTML =
        "Email: " + email + "<br>" +
        "Bank: " + bank + "<br>" +
        "Rekening: " + rek + "<br>" +
        "Nama: " + nama;
    }
}

// LOGOUT
function logout(){
    document.getElementById("dash").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

</script>

</body>
</html>
