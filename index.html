<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucky Reels</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.machine{
    background:#222;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,215,0,.4);
}

.reels{
    display:flex;
    gap:15px;
    margin:20px 0;
}

.reel{
    width:90px;
    height:90px;
    background:#fff;
    color:#000;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:bold;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#status{
    margin-top:15px;
    font-size:20px;
}
</style>
</head>
<body>

<div class="machine">
    <h1>Lucky Reels</h1>

    <div class="reels">
        <div class="reel" id="r1">🍒</div>
        <div class="reel" id="r2">🍋</div>
        <div class="reel" id="r3">⭐</div>
    </div>

    <button onclick="spin()">SPIN</button>

    <div id="status">Tekan SPIN</div>
</div>

<script>
const symbols=["🍒","🍋","🍉","⭐","💎","7️⃣"];

function randomSymbol(){
    return symbols[Math.floor(Math.random()*symbols.length)];
}

function spin(){

    let count=0;

    let anim=setInterval(()=>{
        r1.textContent=randomSymbol();
        r2.textContent=randomSymbol();
        r3.textContent=randomSymbol();

        count++;

        if(count>15){
            clearInterval(anim);

            let a=randomSymbol();
            let b=randomSymbol();
            let c=randomSymbol();

            r1.textContent=a;
            r2.textContent=b;
            r3.textContent=c;

            if(a===b && b===c){
                status.textContent="🎉 Cocok Semua!";
            }else{
                status.textContent="Coba Lagi";
            }
        }
    },100);
}
</script>

</body>
</html>
