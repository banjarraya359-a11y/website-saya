<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Register</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#ff4d6d,#ff758f);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:100%;
    max-width:400px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{text-align:center;color:#ff4d6d;}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

button:hover{background:#e63956;}

.link{
    text-align:center;
    margin-top:10px;
    cursor:pointer;
    color:#ff4d6d;
}

.form{display:none;}
.form.active{display:block;}

#dashboard{
    display:none;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="form active">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <div class="link" onclick="show('register')">Belum punya akun? Register</div>
</div>

<!-- REGISTER -->
<div id="register" class="form">
    <h2>Register</h2>
    <input type="text" id="regUser" placeholder="Username">
    <input type="password" id="regPass" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <div class="link" onclick="show('login')">Sudah punya akun? Login</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <h2>Selamat Datang 🎉</h2>
    <p id="welcome"></p>
    <button onclick="logout()">Logout</button>
</div>

</div>

<script>
// pindah halaman form
function show(form){
    document.getElementById('login').classList.remove('active');
    document.getElementById('register').classList.remove('active');

    document.getElementById(form).classList.add('active');
}

// REGISTER (simpan ke localStorage)
function register(){
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(user=="" || pass==""){
        alert("Isi semua data!");
        return;
    }

    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    alert("Register berhasil! Silakan login");
    show('login');
}

// LOGIN
function login(){
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let savedUser = localStorage.getItem("user");
    let savedPass = localStorage.getItem("pass");

    if(user == savedUser && pass == savedPass){
        document.getElementById("login").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("welcome").innerText = "Halo, " + user;
    } else {
        alert("Username atau password salah!");
    }
}

// LOGOUT
function logout(){
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("login").style.display = "block";
}
</script>

</body>
</html>
