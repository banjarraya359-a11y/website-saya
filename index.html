<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login + Data Bank</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    width:340px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#0077ff;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0077ff;
    color:white;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:#005fd1;
}

.link{
    text-align:center;
    margin-top:10px;
    color:#0077ff;
    cursor:pointer;
}

.hidden{display:none;}

.card{
    text-align:left;
    font-size:14px;
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<!-- REGISTER -->
<div id="register">
    <h2>Register</h2>
    <input id="rUser" placeholder="Username">
    <input id="rPass" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <div class="link" onclick="showLogin()">Sudah punya akun? Login</div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
    <h2>Login</h2>
    <input id="lUser" placeholder="Username">
    <input id="lPass" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <div class="link" onclick="showRegister()">Register</div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">
    <h2>Dashboard</h2>
    <p id="welcome"></p>

    <h3>Data Bank</h3>

    <input id="bank" placeholder="Nama Bank (BCA, BRI, dll)">
    <input id="rek" placeholder="Nomor Rekening">
    <input id="nama" placeholder="Nama Pemilik">

    <button onclick="saveBank()">Simpan Data Bank</button>

    <div class="card" id="bankData"></div>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script>

// pindah halaman
function showLogin(){
    document.getElementById("register").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

function showRegister(){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("register").classList.remove("hidden");
}

// REGISTER
function register(){
    let u = document.getElementById("rUser").value;
    let p = document.getElementById("rPass").value;

    if(u=="" || p==""){
        alert("Isi semua data!");
        return;
    }

    localStorage.setItem("user", u);
    localStorage.setItem("pass", p);

    alert("Register berhasil!");
    showLogin();
}

// LOGIN
function login(){
    let u = document.getElementById("lUser").value;
    let p = document.getElementById("lPass").value;

    let su = localStorage.getItem("user");
    let sp = localStorage.getItem("pass");

    if(u === su && p === sp){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("dash").classList.remove("hidden");
        document.getElementById("welcome").innerText = "Halo, " + u;

        loadBank();
    } else {
        alert("Login gagal!");
    }
}

// SIMPAN DATA BANK
function saveBank(){
    let bank = document.getElementById("bank").value;
    let rek = document.getElementById("rek").value;
    let nama = document.getElementById("nama").value;

    if(bank=="" || rek=="" || nama==""){
        alert("Isi data bank lengkap!");
        return;
    }

    localStorage.setItem("bank", bank);
    localStorage.setItem("rek", rek);
    localStorage.setItem("namaRek", nama);

    loadBank();
    alert("Data bank tersimpan!");
}

// TAMPILKAN DATA BANK
function loadBank(){
    let bank = localStorage.getItem("bank");
    let rek = localStorage.getItem("rek");
    let nama = localStorage.getItem("namaRek");

    if(bank && rek && nama){
        document.getElementById("bankData").innerHTML =
        "Bank: " + bank + "<br>" +
        "Rekening: " + rek + "<br>" +
        "Nama: " + nama;
    }
}

// LOGOUT
function logout(){
    document.getElementById("dash").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

</script>

</body>
</html>
