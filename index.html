<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Fix Final</title>

<style>
body{
    font-family:Arial;
    background:#ff758f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:320px;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:#ff4d6d;
    border:none;
    color:white;
    cursor:pointer;
}

.hidden{display:none;}

.link{
    text-align:center;
    margin-top:10px;
    cursor:pointer;
    color:#ff4d6d;
}
</style>
</head>
<body>

<div class="box">

<!-- REGISTER -->
<div id="reg">
    <h3>Register</h3>
    <input id="ru" placeholder="username">
    <input id="rp" placeholder="password">
    <button onclick="reg()">Daftar</button>
    <div class="link" onclick="toLogin()">ke login</div>
</div>

<!-- LOGIN -->
<div id="log" class="hidden">
    <h3>Login</h3>
    <input id="lu" placeholder="username">
    <input id="lp" placeholder="password">
    <button onclick="log()">Masuk</button>
    <div class="link" onclick="toReg()">ke register</div>
</div>

<!-- DASH -->
<div id="dash" class="hidden">
    <h3>Berhasil Login</h3>
    <p id="out"></p>
    <button onclick="logout()">Logout</button>
</div>

</div>

<script>

// pindah
function toLogin(){
    document.getElementById("reg").classList.add("hidden");
    document.getElementById("log").classList.remove("hidden");
}

function toReg(){
    document.getElementById("log").classList.add("hidden");
    document.getElementById("reg").classList.remove("hidden");
}

// register
function reg(){
    let u = document.getElementById("ru").value;
    let p = document.getElementById("rp").value;

    if(!u || !p){
        alert("isi dulu");
        return;
    }

    localStorage.setItem("u", u);
    localStorage.setItem("p", p);

    alert("register sukses");
    toLogin();
}

// login
function log(){
    let u = document.getElementById("lu").value;
    let p = document.getElementById("lp").value;

    let su = localStorage.getItem("u");
    let sp = localStorage.getItem("p");

    console.log("DEBUG:", su, sp); // 🔥 penting

    if(u === su && p === sp){
        document.getElementById("log").classList.add("hidden");
        document.getElementById("dash").classList.remove("hidden");
        document.getElementById("out").innerText = "Halo " + u;
    } else {
        alert("Login gagal");
    }
}

// logout
function logout(){
    document.getElementById("dash").classList.add("hidden");
    document.getElementById("log").classList.remove("hidden");
}

</script>

</body>
</html>
